name: Daily Codex skin curation

on:
  schedule:
    # GitHub Actions schedules use UTC. 13:00 UTC is 21:00 in Asia/Shanghai.
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-codex-skin-curation
  cancel-in-progress: false

jobs:
  curate:
    name: Research and update the directory
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the default branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Research and curate candidate projects
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node .github/scripts/curate.mjs

      - name: Commit and push a verified update
        run: |
          if git diff --quiet -- README.md; then
            echo "No suitable projects found."
            exit 0
          fi
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: curate Codex skin projects"
          git push origin HEAD:${{ github.event.repository.default_branch }}
